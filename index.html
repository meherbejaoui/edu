@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#0D1320; --ink2:#131B2C; --panel:#182238; --line:#33415E;
  --paper:#F3EDDD; --paper2:#E9E0CA; --paperline:#C6B994; --inkonpaper:#241E12;
  --papermuted:#584B2E;
  --brass:#D4AC2B; --brassdim:#75621C; --red:#C43A31; --redlite:#F09A93; --reddark:#8E2620;
  --steel:#B4C3D3; --green:#4C7A50; --greenlite:#8FCB94; --blue:#3E6B8F;
}
.ar-root{min-height:100vh;background:
  radial-gradient(1200px 600px at 70% -10%, #1B2740 0%, transparent 60%),
  radial-gradient(900px 500px at 0% 110%, #141E33 0%, transparent 55%),
  var(--ink);
  color:var(--paper); font-family:'Public Sans',system-ui,sans-serif; font-size:16px;}
.ar-display{font-family:'Fraunces',serif;}
.ar-mono{font-family:'IBM Plex Mono',monospace;}
.paper{background:linear-gradient(178deg,var(--paper) 0%, var(--paper2) 100%);
  color:var(--inkonpaper); border:1px solid var(--paperline);
  box-shadow:0 1px 0 rgba(255,255,255,.35) inset, 0 14px 30px rgba(0,0,0,.45);}
.paper-edge{position:relative;}
.paper-edge:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;
  background:repeating-linear-gradient(180deg,var(--brass) 0 10px, transparent 10px 16px);opacity:.9;}
.stamp{display:inline-block;border:2px solid currentColor;padding:3px 12px;
  letter-spacing:.14em;text-transform:uppercase;font-size:12.5px;font-weight:600;transform:rotate(-2deg);}
.btn{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease, background .12s ease;border:1px solid var(--line);}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn:focus-visible,.choice:focus-visible{outline:3px solid var(--brass);outline-offset:3px;}
.choice{cursor:pointer;transition:transform .14s ease, box-shadow .14s ease;}
.choice:hover{transform:translateY(-3px);box-shadow:0 18px 36px rgba(0,0,0,.5);}
.quietcard{border-style:dashed !important; filter:saturate(.85);}
.quietcard:hover{filter:none;}
.pulse-dot{width:10px;height:10px;border-radius:99px;background:var(--red);flex:none;
  box-shadow:0 0 0 0 rgba(196,58,49,.6);animation:pulse 1.6s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(196,58,49,.55)}70%{box-shadow:0 0 0 10px rgba(196,58,49,0)}100%{box-shadow:0 0 0 0 rgba(196,58,49,0)}}
@keyframes envIn{0%{transform:translateY(60px) rotate(-4deg);opacity:0}60%{transform:translateY(-6px) rotate(1deg);opacity:1}100%{transform:translateY(0) rotate(-1deg)}}
@keyframes shake{0%,100%{transform:translateX(0) rotate(-1deg)}20%{transform:translateX(-5px) rotate(-2deg)}40%{transform:translateX(5px) rotate(0deg)}60%{transform:translateX(-4px) rotate(-1.5deg)}80%{transform:translateX(4px) rotate(-.5deg)}}
.env-in{animation:envIn .7s cubic-bezier(.2,.9,.3,1.2) both;}
.env-shake{animation:shake .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both;}
.fade-up-1{animation:fadeUp .5s .08s ease both;}
.fade-up-2{animation:fadeUp .5s .18s ease both;}
.fade-up-3{animation:fadeUp .5s .3s ease both;}
@media (prefers-reduced-motion: reduce){
  .env-in,.env-shake,.fade-up,.fade-up-1,.fade-up-2,.fade-up-3,.pulse-dot{animation:none}
  .btn:hover,.choice:hover{transform:none}
}
.hairline{height:1px;background:linear-gradient(90deg,transparent,var(--paperline),transparent);}
.tag{font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border-radius:3px;font-weight:600;line-height:1.4;}
.tag-push{background:rgba(196,58,49,.16);color:var(--redlite);border:1px solid rgba(240,154,147,.55);}
.tag-anchor{background:rgba(212,172,43,.14);color:#EBD27A;border:1px solid rgba(212,172,43,.55);}
.timerbar{position:fixed;left:0;right:0;bottom:0;z-index:70;background:rgba(13,19,32,.92);
  border-top:1px solid var(--line);backdrop-filter:blur(6px);}
input.sigfield{width:100%;box-sizing:border-box;padding:13px 15px;font-size:16px;
  font-family:'Fraunces',serif;font-style:italic;background:rgba(255,255,255,.6);
  border:1px solid var(--paperline);border-radius:4px;color:var(--inkonpaper);}
input.sigfield:focus-visible{outline:3px solid var(--brassdim);outline-offset:2px;}
`,Lf=[{id:"disruptor",pack:"foundations",title:"The Irreplaceable Disruptor",role:"You are a team lead at a public research department.",setting:"Alex is a technical genius \u2014 nearly 40% of your team's output, and lead on the project that secures next year's funding. Alex is also consistently late, speaks to colleagues with contempt, and hoards information like a fortress. Two talented juniors have quietly started interviewing elsewhere.",question:"The funding review is in three weeks. Something has to give.",listenIntro:"You have time for THREE conversations before you must act. Some people will come to you. Others never will \u2014 unless you go to them.",stakeholders:[{id:"alex",name:"Alex",role:"Lead engineer",loud:!0,teaser:"\u201CCan we make this quick? I'm carrying this entire project.\u201D",insight:"Behind the arrogance, Alex is drowning. \u201CIf I document everything, I'm replaceable. If something breaks, it's my name on it. You think I like being the only one who knows how this works?\u201D The gatekeeping isn't just ego \u2014 it's fear wearing armor."},{id:"director",name:"Director Hale",role:"Senior director",loud:!0,teaser:"\u201CA word of advice, before you do anything rash\u2026\u201D",insight:"\u201CDon't rock the boat with Alex right now. We cannot afford to jeopardize that funding. Handle the 'personality issues' after the contract is signed.\u201D You notice Hale's own performance bonus is tied to that contract. The advice may not be neutral."},{id:"maya",name:"Maya",role:"Junior analyst",loud:!1,teaser:"She never complains. Her camera has been off in meetings for a month.",insight:"It takes ten minutes of silence before she talks. \u201CI didn't file anything because everyone knows what happens to people who complain about Alex. It's not just me \u2014 three of us have offers in hand. We were just waiting to see if anyone noticed.\u201D"},{id:"sam",name:"Sam",role:"Veteran engineer",loud:!1,teaser:"He keeps his head down and his r\xE9sum\xE9 updated.",insight:"\u201CThe documentation is two years stale. If Alex got hit by a bus tomorrow, this project dies with them. You don't have an Alex problem \u2014 you have a single point of failure that happens to have a personality.\u201D"},{id:"priya",name:"Priya",role:"HR partner",loud:!1,teaser:"\u201CFormally? There's nothing on file.\u201D",insight:"\u201CThat's what worries me. Five people have come to me 'off the record' in a year. Nothing on paper means nothing protects them \u2014 and nothing protects you when this eventually detonates.\u201D"}],pressure:{from:"DIRECTOR HALE \u2014 PRIVATE",text:"\u201CI hear you've been asking around. Let me be clearer: if that funding slips because you picked a fight over office manners, that's on you. Sign-off is in three weeks. Don't make me regret backing you for this role.\u201D",note:"Intimidation just entered the room. Notice what it's doing to your options."},decisionPrompt:"Three weeks to funding review. What do you do about Alex?",decisions:[{id:"A",title:"Protect the contract first",body:"Have a quiet, informal word with Alex about 'toning it down.' Deal with the real issues after signing. The department's survival buys everything else time.",pushes:["Urgency bias","The 'brilliant jerk' pass","Authority intimidation"],anchors:[],lens1:{where:"On the engineering floor, they say:",text:"\u201CManagement saw everything and chose the money. Maya's gone by spring. Why would anyone speak up now?\u201D"},lens2:{where:"On the executive floor, they say:",text:"\u201CFinally, a lead who understands priorities. You can't fix culture in a bankrupt department. Pragmatic. Promotable.\u201D"},later:"EIGHTEEN MONTHS LATER \u2014 The contract was signed. Maya and two others left within four months; recruiting replacements cost more than the raise Alex demanded \u2014 and received. The documentation is now three years stale. Nothing has detonated yet. The word is 'yet.'"},{id:"B",title:"Draw the line now",body:"Meet Alex formally: name the behavior, set clear expectations, and mandate a knowledge-sharing plan starting this week. Tell Hale you're protecting the project by protecting the team \u2014 before signing, not after.",pushes:[],anchors:["Mutual respect, without exception","Knowledge redundancy","The talent pipeline"],lens1:{where:"On the engineering floor, they say:",text:"\u201CSomeone finally said it out loud. Risky as hell three weeks before funding \u2014 but Maya unpacked her r\xE9sum\xE9.\u201D"},lens2:{where:"On the executive floor, they say:",text:"\u201CReckless timing. If Alex walks and the contract dies, this 'principled stand' will have cost forty people their jobs. Principles are cheap when it's not your budget.\u201D"},later:"EIGHTEEN MONTHS LATER \u2014 Alex threatened to quit, didn't, and after two rocky months began mentoring \u2014 it turned out being the only one who knew everything was the thing burning them out. One junior still left. The funding survived. It was never actually about Alex's genius; it was about whether the team could outlive it."},{id:"C",title:"De-risk quietly, confront later",body:"No confrontation yet. Launch 'routine' pair-programming and documentation sprints to break the knowledge monopoly. Once Alex is no longer a single point of failure, you'll hold the harder conversation from strength.",pushes:["Avoidance of high-stakes friction"],anchors:["Knowledge redundancy"],lens1:{where:"On the engineering floor, they say:",text:"\u201CSmart chess, maybe. But Maya isn't waiting for your chess game to finish. The disrespect is still happening every single morning.\u201D"},lens2:{where:"On the executive floor, they say:",text:"\u201CElegant. No drama, no risk to the contract, and the bus-factor problem quietly disappears. This is how grown-ups do it.\u201D"},later:"EIGHTEEN MONTHS LATER \u2014 The documentation sprints worked; the monopoly broke. But the confrontation you postponed never quite happened \u2014 there was always a next deadline. Maya left. Alex is politer to you now, and exactly the same to everyone junior. Strategy without the hard conversation turned out to be half a decision."}],heatPrompt:"Now the hardest room: you sit across from Alex to explain where things stand. How do you open?",heats:[{id:"blame",title:"Point upward",body:"\u201CLook, this is coming from above me. Hale, HR\u2026 my hands are tied here.\u201D",verdict:"The message lands, but you've taught Alex \u2014 and yourself \u2014 that your decisions belong to someone else. Authority you disown is authority you lose.",push:"Diffusion of responsibility"},{id:"firm",title:"Heard, and held",body:"\u201CAlex, I know you're under real stress, and I value your work \u2014 I mean that. But my job is a team that survives you, me, and any single person. The disrespect ends, and the gatekeeping ends. That's not up for negotiation. How we get there \u2014 that part, I want to build with you.\u201D",verdict:"Alex goes quiet for a long moment. Being heard and being held to a line at the same time is a thing most people have rarely experienced. It doesn't feel like winning. It feels like weather changing.",anchor:"Firm and fair are not opposites"},{id:"soften",title:"Soften the blow",body:"\u201CHonestly, you're doing great \u2014 there are just a couple of tiny perception things we should smooth over\u2026\u201D",verdict:"Alex leaves the room reassured that nothing needs to change. You leave the room having held a meeting instead of a line. The problem now has your fingerprints on it.",push:"Fear of being disliked"}]},{id:"budget",pack:"foundations",title:"The City Budget",role:"You chair the council of River City.",setting:"A one-time $20 million grant has landed. It funds exactly one of three projects \u2014 the money cannot be split. Renovate public housing and keep 500 families from displacement this winter. Repair the main bridge engineers say faces 'severe failure' within 24 months, at 5\xD7 the repair cost if it fails. Or subsidize a Green Data Center guaranteeing 100 permanent jobs and a stable tax base for 30 years, in a city drifting toward insolvency.",question:"One grant. Three futures. Everyone will know it was you.",listenIntro:"The vote is tonight. You have time for THREE meetings. The loudest voices are already in your lobby. The quietest ones don't know how to find you.",stakeholders:[{id:"rosa",name:"Rosa Delgado",role:"Tenants' association leader",loud:!0,teaser:"Two hundred people behind her, chanting outside your window.",insight:"\u201CDo you know what a displacement notice in November means? My neighbor is 81. You are not choosing between projects \u2014 you're choosing whether she winters in her home or a shelter. Look at me and tell me a bridge matters more.\u201D She's not wrong. That's what makes it hard."},{id:"deverell",name:"Vera Deverell",role:"VP, Meridian Tech",loud:!0,teaser:"Her assistant has called your office four times today.",insight:"\u201CI'll be direct: we need commitment today or the data center goes to Hartwell County. This isn't a threat, it's a board deadline.\u201D It is also, structurally, a threat. But the 100 jobs and 30 years of tax base are real, whatever her tone is."},{id:"okafor",name:"Chief Engineer Okafor",role:"Public works",loud:!1,teaser:"His report has been on your desk for a month. Reports don't chant.",insight:"\u201CSteel doesn't protest, so nobody hears it corroding. The 24-month window isn't a guess \u2014 it's fatigue-crack data. If the arterial fails, the East Bank is cut off: no ambulances, no deliveries, no school bus. And we'll rebuild it anyway, at five times the price, in an emergency.\u201D"},{id:"lindqvist",name:"CFO Lindqvist",role:"City finance",loud:!1,teaser:"She speaks in spreadsheets. Nobody rallies around a spreadsheet.",insight:"\u201CNobody wants to hear this, so I'll say it quietly: our tax base shrinks 2% a year. At this rate the city that's supposed to fund housing AND bridges is functionally insolvent in eight years. Whatever you choose, ask what a bankrupt city can protect. The answer is nothing.\u201D"},{id:"karim",name:"Karim Haddad",role:"Small business alliance",loud:!1,teaser:"\u201CWe're not protesting. We're just closing, one by one.\u201D",insight:"\u201CEvery pothole adds twenty minutes to my deliveries. Three shops on my street closed this year. We don't make headlines \u2014 we just quietly stop existing. Then people ask where the jobs went.\u201D"},{id:"edna",name:"Edna Whitfield",role:"Retired nurse, East Bank",loud:!1,teaser:"She isn't at the protest. The bus route there crosses the failing bridge.",insight:"\u201CI'm not against those families \u2014 I was a renter for forty years. But if that bridge closes, my whole neighborhood is an island. Dialysis is on the other side of the river, dear. Nobody chants about dialysis.\u201D"}],pressure:{from:"COUNCIL FLOOR \u2014 LIVE UPDATE",text:"Meridian Tech has gone public with its ultimatum: commit tonight or the data center moves to Hartwell. Outside, the protest has doubled \u2014 they're chanting that you value machines over human lives. Your phone shows 61 messages from business owners about the roads. Every camera in the city is pointed at this building.",note:"Intimidation from one side. Social pressure from the other. The quiet data is still sitting on your desk."},decisionPrompt:"The chamber falls silent. The vote is called. Where does the $20 million go?",decisions:[{id:"A",title:"The Housing Lifeline",body:"Fund the renovation. 500 families keep their homes this winter. The bridge and the tax base become next year's problem \u2014 if there's money next year.",pushes:["Empathy under siege \u2014 the 'winter' panic","Moral outcry avoidance"],anchors:["Dignity is not deferrable"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CCOUNCIL PUTS PEOPLE FIRST \u2014 500 families saved from a winter on the street. Proof that government can still choose humans over spreadsheets.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CCOUNCIL BUYS APPLAUSE, MORTGAGES THE FUTURE \u2014 Bridge left to rot, jobs sent to Hartwell. Compassion tonight, collapse on layaway.\u201D"},later:"TWO YEARS LATER \u2014 The renovations held; no family was displaced that winter, and you still get letters about it. Meridian built in Hartwell. Month 26: the arterial was closed as unsafe \u2014 the emergency rebuild is costing 5\xD7 and the East Bank spent a year as an island. Edna moved across the river. Both papers were describing the same decision. Both were describing something true."},{id:"B",title:"The Arterial Repair",body:"Fund the bridge. No ribbon, no applause \u2014 just steel that doesn't fail, ambulances that arrive, and a neighborhood that stays connected. The protesters will still be outside tomorrow.",pushes:[],anchors:["The silent interest \u2014 steel doesn't chant","Lifecycle cost: pay 1\xD7 now or 5\xD7 later","Intergenerational equity"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CCONCRETE OVER CHILDREN \u2014 Council funds asphalt while 500 families face winter eviction notices. Whose city is this?\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CADULTS IN THE ROOM, AT LAST \u2014 Council fixes what actually holds the city up instead of chasing headlines. Stewardship isn't glamorous. It's necessary.\u201D"},later:"TWO YEARS LATER \u2014 The bridge is rebuilt; nobody thanks you for a disaster that didn't happen \u2014 prevention has no photograph. Meridian went to Hartwell. Forty-one of the 500 families were displaced before an emergency state fund covered the rest; you attended those hearings and said nothing in your own defense. Okafor's report gathers no dust now. Neither do you."},{id:"C",title:"The Innovation Hub",body:"Fund the data center. 100 permanent jobs, a tax base stabilized for 30 years \u2014 a city that can afford to fix bridges and housing in the future, bought at the price of both today.",pushes:["Capital-flight panic \u2014 the ultimatum worked"],anchors:["Protect the financial bedrock","A bankrupt city protects no one"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201C$20M FOR A TECH GIANT AS FAMILIES FACE EVICTION \u2014 Council folds to a corporate ultimatum in record time. The machines won.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CCOUNCIL SECURES THE NEXT 30 YEARS \u2014 Jobs, solvency, and a tax base that can actually pay for compassion. This is what long-term thinking looks like.\u201D"},later:"TWO YEARS LATER \u2014 The data center opened; tax revenue is up 11% and Lindqvist's insolvency curve has bent for the first time in a decade. Sixty families were displaced that first winter \u2014 the council chamber heard every name read aloud, and so did you. The bridge got emergency triage, not repair. The clock Okafor described is still ticking, just more slowly. You bought the city a future and paid for it with someone's present."}],heatPrompt:"Tomorrow you must stand before the groups you did NOT choose. What do you tell them?",heats:[{id:"blame",title:"Blame the constraints",body:"\u201CMy hands were tied \u2014 the grant rules, the state, the timeline. If it were up to me alone\u2026\u201D",verdict:"It buys you the afternoon. But everyone in that room heard a leader claim the decision wasn't theirs \u2014 which means next time, why bring decisions to you at all?",push:"Deniability instinct"},{id:"anchor",title:"Name your anchor",body:"\u201CI won't pretend this didn't hurt you \u2014 it did, and I chose it anyway. Here is the principle I used, so you can hold me to it: I weighed every voice, including the ones that weren't in this room, and chose what I believe protects the most people over the longest time. You may think I weighed it wrong. But you will never have to guess how I weighed it.\u201D",verdict:"Someone in the back says, quietly, 'At least you said it to our faces.' It is not forgiveness. It is something rarer \u2014 the beginning of being trusted by people who disagree with you.",anchor:"Radical transparency"},{id:"appease",title:"Promise everyone everything",body:"\u201CThis isn't over \u2014 we'll find funding for the other projects too, I give you my word.\u201D",verdict:"The room softens. Then someone asks 'when?' and 'how much?' \u2014 and you hear yourself improvising a budget that doesn't exist. Hope you can't fund is a loan against your own credibility, at interest.",push:"The approval reflex"}]},{id:"deadline",pack:"foundations",title:"The Deadline of Conscience",role:"You are the release manager. It is your signature on the line.",setting:"A critical banking-app feature ships in 48 hours; missing the deadline means a $50,000 public penalty and a reputation hit. In final review, you find a flaw. It will pass today's inspection \u2014 but it plants a systemic risk that could fail in three years. Your team has worked through the weekend and is at breaking point. Your supervisor phones: \u201CIt's a minor detail. Don't let perfect be the enemy of done. I'm authorizing you to sign.\u201D",question:"One signature block. Your name in it.",listenIntro:"48 hours on the clock. You have time for THREE conversations. The exhausted are loud. The archives are silent.",stakeholders:[{id:"lena",name:"Lena",role:"Lead developer",loud:!0,teaser:"\u201CPlease tell me you're not doing what I think you're doing.\u201D",insight:"\u201CWe've slept nine hours in three days. The flaw is theoretical; the penalty is real, and so is the bonus this team was promised. If you halt this, you're not protecting them \u2014 you're burning them. Sign it.\u201D She's crying and furious at the same time, which is how you know she means every word."},{id:"marsh",name:"Supervisor Marsh",role:"Your boss",loud:!0,teaser:"Third call today. He's being very reassuring.",insight:"\u201CYou have my authorization \u2014 verbal, but you have it. This is what leadership looks like: shipping. Don't overthink a footnote.\u201D You notice he hasn't put a word of it in writing. You notice that you noticed."},{id:"ito",name:"Counsel Ito",role:"Legal advisor",loud:!1,teaser:"She asked for five minutes, off the record. Lawyers rarely whisper.",insight:"\u201CIndustry safety regulations change in six months \u2014 this flaw is legal today and a clear violation the day they land. If it fails in year three, today's $50k becomes a multi-million lawsuit. And liability follows the signature, not the org chart. I'm telling you this because no one else will.\u201D"},{id:"duc",name:"Duc",role:"QA engineer",loud:!1,teaser:"He flagged something in a ticket nobody read. Tickets don't shout.",insight:"\u201CI modeled the failure mode. It's not abstract: under load, the reconciliation error touches escrow accounts \u2014 roughly 200,000 real customers by year three. It won't be a bug report when it happens. It'll be families' money, on the news.\u201D"},{id:"logs",name:"The incident archive",role:"Ops records, 2019",loud:!1,teaser:"A folder nobody opens. History files no complaints.",insight:"You find it near midnight: a 2019 near-miss with the same signature pattern. The engineer who flagged it was overruled 'due to timeline.' The patch that followed cost 14\xD7 the original fix. The last line of the postmortem reads: 'Recommend this never be treated as a footnote again.' It was a footnote by the next quarter."}],pressure:{from:"LEGAL \u2014 URGENT / CONFIDENTIAL",text:"Counsel Ito's memo is now official: the regulation change is confirmed for six months out, and personal liability attaches to the signing officer. You call Marsh to get his authorization in writing. A long pause. \u201CAuthorization? I don't recall framing it that way. This is your call \u2014 it always was.\u201D He hangs up. The room is suddenly very quiet, and very yours.",note:"The permission you were leaning on was never load-bearing. You are standing alone in the heat now."},decisionPrompt:"24 hours left. The signature block is empty. What do you do?",decisions:[{id:"A",title:"Ship it",body:"Sign. Save the $50k, the reputation, the team's bonus. Three years is a long time; regulations shift, systems get patched, maybe the failure never comes. Maybe.",pushes:["Loss aversion \u2014 the $50k panic","Hyperbolic discounting \u2014 Year 3 feels imaginary","Exhaustion-induced surrender"],anchors:[],lens1:{where:"In the team retro, they say:",text:"\u201CFinally, a manager who trusts the team and lives in the real world. The bonus landed. Morale saved. That's leadership.\u201D"},lens2:{where:"In the risk community, they say:",text:"\u201CEvery catastrophic failure in this industry has this exact meeting in its timeline \u2014 the night someone tired signed something they'd read. They just haven't reached year three yet.\u201D"},later:"THREE YEARS LATER \u2014 For two years, nothing. You almost forgot. Then the new regulations landed, an auditor pulled the release records, and the remediation is running at 14\xD7 \u2014 the same multiplier as the 2019 postmortem you may or may not have read. Your signature is on page one of the audit. Marsh's name appears nowhere. He was never in the room. That was the point."},{id:"B",title:"Halt and fix",body:"Stop the release. Take the $50k penalty and the public bruise. Walk into a room of exhausted people and tell them the weekend wasn't enough \u2014 and that you'll carry the blame for it personally.",pushes:[],anchors:["Duty of care to 200,000 strangers","The front-page test","The buck stops at the signature"],lens1:{where:"In the team retro, they say:",text:"\u201CThe bonus is gone and half of us didn't speak to them for a week. But nobody's pretending we shipped something we'd be afraid to explain on television.\u201D"},lens2:{where:"In the risk community, they say:",text:"\u201CA $50k penalty to close a multi-million exposure before a known regulatory change is not a loss. It's the cheapest insurance ever purchased. Most people can't see it because the invoice arrives before the disaster doesn't.\u201D"},later:"THREE YEARS LATER \u2014 The penalty stung and the quarter was ugly; two people never quite forgave you. When the regulations landed, your release passed audit untouched \u2014 the only one in the division that did. Nobody threw a parade; averted disasters don't get parades. Lena said only one thing, a year later: 'I've stopped re-reading everything I sign for you.' It took a moment to realize that was the parade."},{id:"C",title:"Sign with a paper trail",body:"Ship it \u2014 but first, put everything in writing: the flaw, Ito's memo, Marsh's denial, and a funded remediation plan with a hard 6-month deadline, circulated to legal and the board. If they want it shipped, it ships with witnesses.",pushes:["The gray-zone bargain \u2014 risk deferred is still risk"],anchors:["Radical documentation","Forcing accountability into the open"],lens1:{where:"In the team retro, they say:",text:"\u201CThey found a third door \u2014 bonus safe, risk on the record, and Marsh visibly furious about the paper trail, which honestly was a bonus of its own.\u201D"},lens2:{where:"In the risk community, they say:",text:"\u201CClever, and half an answer. The memo protects the signer, not the 200,000 customers \u2014 the flaw ships either way. Documentation is a shield, not a fix. Ask whether you protected the system or just yourself.\u201D"},later:"THREE YEARS LATER \u2014 The paper trail worked: the board couldn't unsee it, and remediation was funded \u2014 though it slipped to month nine, because deadlines without champions drift. The fix landed before the regulations did, barely. You were protected throughout. On slow nights you still do the math on those three months of open exposure, times 200,000 accounts, and consider how much of your anchor was principle and how much was laminate."}],heatPrompt:"Whatever you chose, you now face the team that gave you their weekend. First sentence. Go.",heats:[{id:"blame",title:"Hide behind Legal",body:"\u201CLook, Legal forced my hand here. Take it up with Ito's office.\u201D",verdict:"Ito took a professional risk to warn you quietly, and you just spent her trust to buy yourself an easier meeting. The next warning won't come early. It may not come at all.",push:"Sacrificing your allies to the room"},{id:"honest",title:"Own it, all of it",body:"\u201CThis was my call \u2014 not Marsh's, not Legal's, mine \u2014 and I know exactly what it cost you. I owe you two things: the full reasoning, tonight, with every question answered. And a promise that your weekend will never again depend on a flaw someone found in hour 46. Ask me anything.\u201D",verdict:"The anger doesn't vanish; anger that's earned shouldn't. But something else settles into the room \u2014 the strange calm of people who know precisely where their leader stands, even when they're standing somewhere unpopular.",anchor:"Compassionate firmness"},{id:"bribe",title:"Promise the bonus anyway",body:"\u201CI'll make it up to you \u2014 I'll find the bonus money somewhere, whatever it takes.\u201D",verdict:"You don't control that budget, and half the room knows it. When the money doesn't materialize, this meeting will be remembered not as the day you decided, but as the day you promised.",push:"Buying peace on credit"}]},{id:"arrival",pack:"frontline",title:"The Nine Buses",role:"You are the mayor of Halden Falls, population 61,000.",setting:"Over three weeks, nine chartered buses from the state capital have brought 900 asylum seekers to your town \u2014 legally present, work permits pending in an eight-month federal backlog. The shelters filled in four days. Winter arrives in six weeks. The state promises reimbursement; the paperwork remains unsigned. Your town did not ask for this. Neither did the people on the buses.",question:"Six weeks to frost. What does Halden Falls become?",listenIntro:"You have time for THREE meetings before the council session. The rallies are loud. The spreadsheets and the people sleeping in the church basement are not.",stakeholders:[{id:"ruth",name:"Pastor Ruth Okonkwo",role:"Shelter coalition",loud:!0,teaser:"\u201CWe are out of floor. I am not speaking metaphorically.\u201D",insight:"\u201CEvery church basement in this town is full. My volunteers are sleeping four hours a night. I don't need a debate about federal policy \u2014 I need heated square footage before the first frost, and the rec center has it. History will remember what this town did in these six weeks. So will God, but take whichever motivates the council.\u201D"},{id:"dan",name:"Dan Kowalski",role:"Residents' association",loud:!0,teaser:"He's brought a petition with 4,000 signatures \u2014 and hospital paperwork.",insight:"\u201CBefore you file me under 'angry mob' \u2014 my daughter waited nine hours at the ER on Tuesday. Clinic waits have doubled. We're 61,000 people absorbing a decision made in the capital by people who will never meet anyone on those buses. I'm not asking you for cruelty. I'm asking for a number and a plan, because 'as many as needed' is not a plan.\u201D"},{id:"vega",name:"Superintendent Vega",role:"School district",loud:!1,teaser:"Her enrollment memo is three pages of arithmetic. Arithmetic doesn't rally.",insight:"\u201CThere are 140 school-age children in that group, and the law says I seat every one of them Monday morning \u2014 which I will, gladly. But per-pupil state funding lags enrollment by a full year. I'm buying this year's teachers with last year's headcount. Nobody at either rally is chanting about my staffing formula.\u201D"},{id:"amira",name:"Amira",role:"Asylum seeker, former ICU nurse",loud:!1,teaser:"She's been translating for other families all week. Nobody has asked her anything.",insight:"\u201CIn my country I ran an intensive care unit. Here I am forbidden to work for eight more months while a clinic two streets away posts nursing vacancies. Everyone argues about what we cost. Almost no one asks what we're being prevented from contributing. I don't want your charity. I want your permission slip.\u201D"},{id:"barros",name:"Chief Barros",role:"Police department",loud:!1,teaser:"\u201CCan I show you the actual numbers before you read the comments section?\u201D",insight:"\u201CIncidents involving the new arrivals: statistically flat \u2014 lower than the town average, if you want the truth. What's killing me is overtime for rumor control and rally security, and a viral video from another state that everyone thinks happened here. I police reality. I'm losing to fiction.\u201D"},{id:"chen",name:"Budget Officer Chen",role:"Town finance",loud:!1,teaser:"She's run the reimbursement history back ten years. It's not encouraging.",insight:"\u201COur reserves cover roughly ten weeks of full shelter operations. Historical state reimbursement for emergency mandates: about 60 cents on the dollar, arriving fourteen months late. Whatever the council's heart says, I need it to also read this table, because compassion written in ink we don't have is a check that bounces on someone.\u201D"}],pressure:{from:"STATE HOUSE \u2014 WIRE ALERT",text:"The state has frozen all emergency reimbursements 'pending audit' \u2014 indefinitely. Meanwhile a 40-second video of a scuffle near the rec center is going viral statewide; it's out of context, and it doesn't matter. Two rallies have filed permits for the same square, the same morning: one demanding the shelters close, one demanding they expand. Both organizers have invited news crews. Both have invited you.",note:"The money just became hypothetical. The anger just became certain. The 140 kids still start school Monday."},decisionPrompt:"The council session opens. Winter doesn't wait for the audit. What is your order?",decisions:[{id:"A",title:"Open the rec center \u2014 shelter them all",body:"Convert the rec center into full emergency shelter with services, funded from reserves, betting the state eventually pays. Nobody sleeps outside in Halden Falls. Not this winter.",pushes:["Betting the reserves on an unsigned promise","Governing for the rally that cheers you"],anchors:["No one freezes in a town with heated buildings"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CHALDEN FALLS SHOWS THE COUNTRY ITS SOUL \u2014 Every family sheltered before the frost. One small town just out-governed the entire state.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CMAYOR SPENDS THE RESERVES ON A FROZEN PROMISE \u2014 Residents' clinic waits double while the capital applauds a town it bankrupted by bus.\u201D"},later:"EIGHTEEN MONTHS LATER \u2014 The state reimbursed 55 cents on the dollar, sixteen months late; the road bond was delayed to cover the gap, and Kowalski's slate won three council seats saying so. Also true: all 140 kids are enrolled, no one froze, and Amira \u2014 permit finally granted \u2014 now works at the very clinic whose wait times fueled the petition. She staffed the shortage everyone was arguing about. Both rallies were describing the same town."},{id:"B",title:"Managed intake \u2014 a cap with a system",body:"Shelter 350 \u2014 the number Chen and Vega confirm services can hold \u2014 negotiate binding transfer agreements with four nearby cities and the state for the rest, and open a legal clinic to attack the work-permit backlog so people can support themselves.",pushes:[],anchors:["Capacity honesty over capacity theater","Burden-sharing beats burden-shifting","A permit is worth ten cots"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CMAYOR PUTS A NUMBER ON COMPASSION \u2014 550 human beings become 'transfers.' Ask them how managed it feels from inside a bus.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CFINALLY, A PLAN INSTEAD OF A POSE \u2014 Intake matched to actual capacity, four cities sharing the load, and a clinic that turns dependents into workers.\u201D"},later:"EIGHTEEN MONTHS LATER \u2014 The cap held and six towns copied the model; the permit clinic cut waits from eight months to three, and 60 of the 350 now work locally. Also true: transfers stalled for 250 people who dispersed to counties with no system at all \u2014 some landed worse than if you'd never counted. Pastor Ruth hasn't spoken to you since. Dan Kowalski does, which you notice means something different than it used to."},{id:"C",title:"Refuse the role \u2014 force it back on the state",body:"Decline municipal shelter operations. Fund onward transport, legal aid, and coordination \u2014 and publicly declare this a state-manufactured crisis that a town of 61,000 will not be made to absorb in silence.",pushes:["Passing the coat in winter","The relief of a smaller problem"],anchors:["Accountability lands where the decision was made"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CHALDEN FALLS BUYS BUS TICKETS INSTEAD OF BLANKETS \u2014 The mayor's 'principled stand' has a wind-chill factor.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CMAYOR REFUSES TO LET THE STATE DUMP ITS FAILURE ON A SMALL TOWN \u2014 Someone finally sent the bill back to the people who wrote it.\u201D"},later:"EIGHTEEN MONTHS LATER \u2014 The state took five weeks to respond; in week three, two families slept in cars and one hospitalization carried your name into national news. In month two, the state opened the regional intake center your refusal arguably forced into existence \u2014 it now serves four counties, and towns quietly thank you. The reserves are intact. Your town's name means two different things now, depending on who's saying it, and both of them are about you."}],heatPrompt:"The morning of the two rallies, you walk into the square \u2014 both crowds, one microphone. What do you say?",heats:[{id:"blame",title:"Point at the capital",body:"\u201CTake it up with the state. They sent the buses, they froze the money. I'm just the mayor.\u201D",verdict:"Both crowds actually agree with you for eleven seconds \u2014 a record. Then someone shouts 'so what are YOU going to do?' and you realize blame, however accurate, is not a plan, and everyone in the square knows it.",push:"Accurate blame, absent leadership"},{id:"anchor",title:"Name your anchor to both crowds",body:"\u201CHalf of you think I did too much, half think I did too little \u2014 which means you deserve to know exactly how I decided. I weighed the people on those buses AND the people at that clinic, the reserves we actually hold, and the winter that doesn't check permits. Here is my line, hold me to it: no one freezes, no one's ER wait becomes permanent, and no one gets to be a rumor instead of a neighbor.\u201D",verdict:"Neither crowd cheers. But both crowds listen \u2014 and afterward, the two organizers are photographed talking to each other, which the Ledger and the Tribune both print, with different captions.",anchor:"One message for every room"},{id:"appease",title:"Tell each crowd what it came for",body:"You angle toward each side in turn: reassurances of firmness for one, promises of expansion for the other, hoping the clips don't meet.",verdict:"The clips meet by lunchtime, edited side by side. The story is no longer immigration. The story is you.",push:"The two-faced microphone"}]},{id:"sirens",pack:"frontline",title:"The Two Sirens",role:"You chair the public-safety committee of Veradale.",setting:"Two facts, both true, neither canceling the other: violent crime downtown is up 18% in two years, and 911 response times have slid from 14 minutes to 22 \u2014 the force is 60 officers short. And three weeks ago, officers responding to a mental-health call injured an unarmed man in crisis; the video is everywhere; his mother has not missed a council session since. Tonight you allocate a one-time $10 million public-safety increment.",question:"Two sirens, one budget. Which one do you answer \u2014 and what do you tell the other?",listenIntro:"You have time for THREE meetings before the vote. The union and the family are already at your door. The data, the ER, and the barbershop are not.",stakeholders:[{id:"reyes",name:"Sgt. Marisol Reyes",role:"Police union president",loud:!0,teaser:"\u201CSixty vacancies. Mandatory double shifts. Ask me anything.\u201D",insight:"\u201CMy members are working sixteen-hour doubles and you want to know why de-escalation fails at hour fifteen? You cannot reform an empty precinct. Every plan that doesn't start with bodies in uniforms is a speech, and the response-time clock doesn't listen to speeches.\u201D She's exhausted too. It shows."},{id:"denise",name:"Denise Carter",role:"Mother of the injured man",loud:!0,teaser:"She sits in the same seat every session, holding the same photograph.",insight:"\u201CMy son called 911 himself. He asked for help and help is what broke his shoulder in the driveway of the house he grew up in. I'm not against police \u2014 I'm against sending a hammer when someone dials for a doctor. My question is one sentence: when the next mother's son calls, who do you plan to send?\u201D"},{id:"whitmore",name:"Dr. Whitmore",role:"Crime analyst",loud:!1,teaser:"Her briefing deck has 40 slides. Attendance at her briefings: two people.",insight:"\u201CThree things the shouting hides: 62% of our 911 growth is mental-health and disorder calls, not violence. The violence itself is concentrated in four micro-zones covering 5% of the city. And the strongest evidence we have is boring \u2014 lighting, targeted patrol, violence interruption in exactly those zones. The data has a shape. The budget should have the same shape.\u201D"},{id:"tomas",name:"Tomas",role:"ER trauma nurse",loud:!1,teaser:"\u201CI treat everyone in this argument. They arrive on the same gurneys.\u201D",insight:"\u201CTuesday I treated a gunshot victim from the Fourth Street zone, an officer with a stress cardiac event, and a man in psychosis who waited nine hours for a psych bed that doesn't exist. From where I stand there's no debate \u2014 there's one broken pipeline, and everyone in it is bleeding from a different section.\u201D"},{id:"marcus",name:"Marcus Bell",role:"Barber, downtown",loud:!1,teaser:"Thirty years on Fourth Street. He refuses to join either march.",insight:"\u201CMy regulars are scared to come after dark \u2014 I want police on this block, real ones, walking. My nephew also got slammed on a wall for matching a description. People keep asking me to pick a team. Safety AND respect \u2014 why is that two teams? On this street it's just Tuesday.\u201D"},{id:"kim",name:"Officer Dana Kim",role:"Patrol, 19 years",loud:!1,teaser:"She asked to meet away from the precinct. Veterans don't do that lightly.",insight:"\u201COff the record: a hiring surge without fixing why people leave just manufactures exhausted rookies \u2014 and exhausted rookies are how you get more videos. What would actually change my shift? Someone else taking the 3 a.m. crisis calls I was never trained for. I became a cop to stop violence, not to be the city's only social worker with a gun.\u201D"}],pressure:{from:"DISPATCH \u2014 PRIORITY / COUNCIL SECURITY",text:"A shooting, two blocks from these chambers, eleven minutes ago \u2014 inside one of Dr. Whitmore's four zones. The march outside has swelled and turned toward the building. Sgt. Reyes has just announced the union will hold a no-confidence vote on this committee if the funds don't go to hiring. Denise Carter has not moved from her seat. Both sirens are now audible from the dais. Literally.",note:"The tragedy is real. The intimidation is also real. They arrived in the same minute, and neither one is data."},decisionPrompt:"The vote is called. Ten million dollars. What does Veradale buy?",decisions:[{id:"A",title:"The hiring surge",body:"40 new officers, retention bonuses, overtime relief. Fill the vacancies, fix the response clock, and let a fully staffed force be the platform every other reform stands on.",pushes:["Answering only the loudest siren","Union brinkmanship worked"],anchors:["An empty precinct protects no one"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CA CRISIS OF TRUST, ANSWERED WITH MORE OF THE SAME \u2014 Not one dollar for the calls that actually broke this open. Denise Carter's question is still on the table.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CCOUNCIL FINALLY BACKS THE BADGE \u2014 Response times, not slogans. You can't de-escalate a 911 call that nobody answers.\u201D"},later:"TWO YEARS LATER \u2014 Response times: down to 17 minutes; downtown robberies down 9%. The academy pipeline ran slower than the press release \u2014 26 hired, not 40 \u2014 and crisis calls still land on patrol, where Officer Kim predicted what that yields: another incident, year two. This one ended safely \u2014 bodycam, a sergeant with new de-escalation training, luck. Which lesson Veradale takes from that depends, as ever, on the paper."},{id:"B",title:"The portfolio \u2014 shape the budget like the data",body:"Clinician co-responder teams for crisis calls citywide; violence interruption plus lighting and 12 targeted officers in the four hot zones; retention money for the force you already have. Both sirens get answered \u2014 neither gets everything.",pushes:[],anchors:["Match the response to the call","The four blocks where it actually happens","Both sirens are real"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CA COUNCIL THAT LISTENED TWICE \u2014 Crisis calls get clinicians, hot blocks get light and presence. Imperfect, and the first honest budget in years.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CA LITTLE OF EVERYTHING, ENOUGH OF NOTHING? \u2014 Twelve officers against sixty vacancies, and the union's no-confidence vote says the math out loud.\u201D"},later:"TWO YEARS LATER \u2014 Co-responders took 9,000 calls with zero serious injuries on any of them; shootings in the four zones fell 24%. The union's no-confidence vote passed anyway and the chief resigned; citywide response times barely moved, because the vacancies were never filled \u2014 the critics were right about that. Both papers ran anniversary retrospectives claiming vindication. Both quoted Marcus Bell. He'd said the same sentence to each."},{id:"C",title:"Legitimacy first",body:"An oversight board with subpoena power, a training overhaul, cameras and street lighting citywide. No new headcount \u2014 the argument being that trust is the infrastructure every officer stands on, and it's the thing currently on fire.",pushes:["Governing for the cameras","Deferring the vacancy arithmetic"],anchors:["Legitimacy is a public-safety tool"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CCOUNCIL TREATS TRUST AS INFRASTRUCTURE \u2014 The first public-safety budget in memory that starts with the people being policed.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CNOT ONE NEW OFFICER \u2014 Council funds paperwork and committees while 911 callers listen to hold music. Ask the next victim how the subpoena power worked out.\u201D"},later:"TWO YEARS LATER \u2014 The oversight board seated after fourteen months of litigation; complaint rates fell and, for the first time in a decade, surveyed trust in police rose in every district \u2014 including among officers, which no one predicted. Response times slid to 25 minutes, and one high-profile unsolved case became the attack ad that nearly ended your career. The lighting quietly cut burglaries 12%. Nobody has ever chanted about lighting."}],heatPrompt:"Tomorrow, 7 a.m.: you address precinct roll call \u2014 and Denise Carter is in the front row, because you invited her. One room. Both sirens. Go.",heats:[{id:"blame",title:"Hide behind the data",body:"\u201CLook \u2014 the numbers made this decision, not me. Take it up with the analysts.\u201D",verdict:"Dr. Whitmore's forty slides took no vote and signed no budget. The room hears a leader outsourcing a choice to a spreadsheet, and both the officers and Mrs. Carter conclude the same thing: nobody is actually steering.",push:"Hiding behind the spreadsheet"},{id:"honest",title:"Say the whole thing to the whole room",body:"\u201CSergeant, your people are carrying too much \u2014 that's true, and this budget doesn't fully fix it. Mrs. Carter, your son called for help and got hurt \u2014 that's true, and no line item undoes it. I made a call that leaves both of you partly unsatisfied, and I'll tell you exactly why, because you'll be living in it together long after I'm gone. Ask me anything, in front of each other.\u201D",verdict:"Silence \u2014 the working kind. Afterward, Reyes and Carter don't shake hands. But they leave through the same door, still talking, and Officer Kim tells you later that roll call has never once, in nineteen years, been that quiet.",anchor:"Both truths, out loud, same room"},{id:"appease",title:"Promise each side its missing piece",body:"\u201CThe hiring money is coming next cycle, I promise \u2014 and Mrs. Carter, so is the full crisis system. Everyone gets there.\u201D",verdict:"Next cycle's budget is already spoken for, and the union's accountant knows it before you finish the sentence. You've converted two groups who distrusted each other into two groups who jointly distrust you. It is, technically, unity.",push:"Peace on layaway"}]},{id:"arithmetic",pack:"frontline",title:"The Arithmetic of a Promise",role:"You chair the school board of Marrow County.",setting:"Enrollment has fallen for nine straight years; the state funding formula just changed; the district faces an $18 million structural shortfall. Half your buildings run below 45% capacity and cost the same to heat either way. Teacher pay already trails the region by 12%. The counselor ratio is 1 to 480. Every option on tonight's agenda breaks a promise someone was made.",question:"Which promise do you break on purpose \u2014 before the arithmetic breaks all of them for you?",listenIntro:"You have time for THREE meetings before the board votes. The gym will be packed either way. Some of the people who matter most won't be in it.",stakeholders:[{id:"gail",name:"Gail Osei",role:"Teachers' union president",loud:!0,teaser:"\u201CI've got 74 resignation-ready teachers in a folder. Want to see it?\u201D",insight:"\u201CWe're 12% under the region and you're debating which of us to cut. Every teacher who crosses the county line takes a classroom's worth of stability with them. You can close buildings or trim sports \u2014 but if this budget touches pay or headcount, the shortage you create will cost triple what it saves. I've watched three boards learn that the expensive way.\u201D"},{id:"trish",name:"Trish Alvarado",role:"Lincoln Elementary parents",loud:!0,teaser:"Her flyer reads: 'A NEIGHBORHOOD WITHOUT A SCHOOL IS A PARKING LOT.'",insight:"\u201CLincoln is the only school that ever worked for our side of town \u2014 scores up three years straight, teachers who know every kid's name. Your consolidation map puts six-year-olds on a 50-minute bus to a building with triple the class size. You call it a facilities decision. From our porch it looks like the district deciding, again, which neighborhood is optional.\u201D"},{id:"ahn",name:"CFO Ahn",role:"District finance",loud:!1,teaser:"His model has no adjectives in it. That's rather the point.",insight:"\u201CThe arithmetic, without seasoning: closing two buildings saves $6.2M a year, recurring, forever. Program cuts save $7M once, then the deficit returns wearing a bigger coat. A levy raises $9M \u2014 if it passes, and the last two didn't. I don't get a vote, but I'll say this: one-time answers to recurring problems are how we got here.\u201D"},{id:"jayla",name:"Jayla",role:"Student board representative",loud:!1,teaser:"She has a seat at the table and, technically, no vote. She counted.",insight:"\u201CAdults fight about buildings and salaries because those have addresses and names. You know what's invisible? The counselor line. It's 1-to-480 now; I waited three weeks in October, and I'm the student who knows how to ask. Whatever you cut, I'm asking you to say out loud which kids feel it, because from this seat, 'across the board' always lands on the same people.\u201D"},{id:"frank",name:"Frank Novak",role:"Retired homeowner",loud:!1,teaser:"He's not at the rallies. He's at his kitchen table with a calculator.",insight:"\u201CI taught shop in this district for 31 years, so don't file me under 'hates kids.' My property tax is up 30% in a decade and my pension is not. A levy without a senior exemption doesn't tax my house \u2014 it taxes whether I can keep it. Write the exemption in, and I'll knock doors for you myself. I've still got the shoes.\u201D"},{id:"torres",name:"Principal Torres",role:"Lincoln Elementary",loud:!1,teaser:"She asked to see you privately \u2014 and brought two folders, not one.",insight:"\u201CFolder one: three years of rising scores, the attendance turnaround, the mentoring program \u2014 everything Lincoln is. Folder two, which Trish hasn't seen: the $4M roof estimate and the boiler that won't pass inspection twice more. I will fight for this school with everything I have. You deserved to fight with the whole truth in the room.\u201D"}],pressure:{from:"STATE CAPITOL + DISTRICT LEAK \u2014 SAME HOUR",text:"The state just announced a mid-year aid clawback: another $3 million, effective immediately. And a draft consolidation memo \u2014 an early version, with a closure list the board never approved \u2014 has leaked to social media. Four hundred people are now in the gym. Parents are reading the wrong list aloud through a megaphone. Gail's members are filing in wearing red. Frank Novak, improbably, is also here.",note:"The hole just got deeper and the trust just got thinner, in the same hour. The vote is still tonight."},decisionPrompt:"The gym quiets, barely. Eighteen million dollars short, plus three. What does the board do?",decisions:[{id:"A",title:"Close and consolidate",body:"Close two under-enrolled buildings, including Lincoln. Reinvest the recurring savings in teacher pay, counselors, and transport. Solve the structural problem structurally \u2014 and own what it costs one neighborhood.",pushes:["The spreadsheet can't see a walking distance"],anchors:["Recurring problems need recurring answers","Solvency is a promise to every student"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CBOARD CLOSES THE ONE SCHOOL THAT WAS WORKING \u2014 Efficiency finds the poorest neighborhood first. It always seems to know the way.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CA BOARD THAT CAN COUNT \u2014 Half-empty buildings finally consolidated; the savings go to teachers and counselors instead of boilers. Arithmetic wins one.\u201D"},later:"THREE YEARS LATER \u2014 The savings were real and recurring: pay gap closed to 4%, counselor ratio down to 1-to-310 \u2014 Jayla's line, though she'd graduated by then. Lincoln's kids dipped academically in year one and recovered by year two, except one fifth-grade cohort that never quite did; nobody's dashboard has a column for that. The building became a health clinic \u2014 the neighborhood gained a doctor and lost its 3 p.m. heartbeat. Torres runs the consolidated school now. Every June, she does the math both ways, and it comes out different depending on which folder she opens first."},{id:"B",title:"Cut programs, keep every door open",body:"Trim arts, athletics, counselors, and electives across every school. No building closes, no neighborhood is singled out, and the whole district shares a thinner year \u2014 or several.",pushes:["Spreading pain to avoid a fight","The invisible cut \u2014 the one Jayla named"],anchors:["No neighborhood is optional"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CEVERY SCHOOL STAYS OPEN \u2014 Board refuses to sacrifice a neighborhood and asks the whole district to carry the weight together.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CDEATH BY A THOUSAND CUTS \u2014 Board guts counselors and music to dodge one hard vote. The deficit will be back; the cello program won't.\u201D"},later:"THREE YEARS LATER \u2014 Every door stayed open, and it mattered: Lincoln's scores kept climbing, and no neighborhood got a parking lot. Also: 31 teachers crossed the county line anyway \u2014 Gail's folder, proven right \u2014 and the counselor ratio hit 1-to-610 the same winter the deficit returned, wearing the bigger coat Ahn predicted. A volunteer coalition saved the music program, which the Ledger printed as proof that community works, and the Tribune printed as proof of what the board abandoned. Same concert. Same third-graders. Two reviews."},{id:"C",title:"Put it to the voters \u2014 the levy",body:"Draft a levy with Frank's senior exemption written in, bridge this year with a loan, and put the real price of the district on the ballot. If the county says no, next year's cuts go deeper \u2014 and everyone will have chosen them.",pushes:["Deferring the decision you were elected to make","Betting the counselors on a coin flip"],anchors:["The bill goes to the people, itemized","Honesty about what schools cost"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CBOARD PUTS DEMOCRACY ON THE BALLOT \u2014 And children's counselors on a coin flip. Courage, or a very public shrug?\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CBOARD ASKS FOR A BLANK CHECK INSTEAD OF A DECISION \u2014 Can't manage the budget you have? Request a bigger one. The bridge loan's interest is due either way.\u201D"},later:"THREE YEARS LATER \u2014 The first levy failed 48\u201352, and the bridge loan cost $840,000 in interest \u2014 a number your opponents laminated. The rewritten levy, with Frank's exemption and an itemized bill, passed 55\u201345 a year later; he knocked 400 doors, as promised. The district is now the only fully funded one in the region. You lost your seat in the year between the two votes, and watched the vindication from the audience, which is where, you've noticed, most vindication is watched from."}],heatPrompt:"The vote is cast. Four hundred people in the gym are waiting, and the megaphone is being handed to you. First words.",heats:[{id:"blame",title:"Blame the formula",body:"\u201CThe state changed the formula. The capitol did this, not this board. Direct your anger there.\u201D",verdict:"You're not wrong, and the gym knows you're not wrong \u2014 the clawback is real. But they elected you to govern inside the formula, not to narrate it. 'It's the state's fault' and 'we have a plan' are different sentences, and tonight you only said one of them.",push:"Accurate blame, absent plan"},{id:"honest",title:"Read out the arithmetic and your anchor",body:"\u201CHere is the whole board packet \u2014 every number, on the district site tonight, nothing redacted. Here is the promise we chose to break, and the promises we broke it to keep. And here is the standard I ask you to hold us to: every dollar this decision frees will be traceable to a classroom, publicly, every quarter. Check my math. Please. That's not rhetoric \u2014 the spreadsheet has a comment column.\u201D",verdict:"Someone actually does check the math \u2014 a retired accountant, row nine, and she finds a $200k error, which you correct and credit her for publicly. Strangely, that lands better than a perfect spreadsheet ever could have: a board that can be checked is a board that can be trusted.",anchor:"Show the arithmetic, take the questions"},{id:"appease",title:"Promise it all back",body:"\u201CThese cuts are temporary \u2014 everything comes back as soon as revenues recover. Two years, maybe three, tops.\u201D",verdict:"Revenues have declined for nine consecutive years, and everyone in the gym holding a district paycheck knows the trend line. The applause is thin and it is brief, and it is the last benefit of the doubt this room will extend to you.",push:"The restoration mirage"}]},{id:"verdon",pack:"hardground",title:"The Shelter on Verdon Street",role:"You are the Deputy Mayor for Housing.",setting:"Three people froze to death downtown last winter. A federal grant will fund a 90-bed low-barrier shelter \u2014 but it expires in 60 days, and the only code-ready building the city owns is a former convent on Verdon Street, a modest residential block that already absorbed a methadone clinic six years ago, after the city promised the neighborhood it was 'done carrying the city's weight.'",question:"Sixty days to a cold snap. Where does the city put other people's suffering?",listenIntro:"You have time for THREE conversations before the public meeting. The angry are organized. The dying are not in the room \u2014 someone has to speak for them, and someone has to speak for the street that keeps being asked.",stakeholders:[{id:"nadia",name:"Nadia Ferro",role:"Verdon residents' association",loud:!0,teaser:"She voted FOR the shelter levy. She's brought photographs, and the minutes.",insight:"She's no caricature. She lays out photos of needles in the churchyard from the clinic's first year, and the minutes of the meeting where the city made its promise. \u201CWhy is it always this street, and never the streets where councilmembers live? I'm not asking you to abandon those people. I'm asking why my block is the answer every single time.\u201D"},{id:"okafor",name:"Rev. Thomas Okafor",role:"Winter warming van",loud:!0,teaser:"He knew all three who died last winter. By name.",insight:"\u201CA low-barrier shelter is the only kind the people outside will actually walk into. The sobriety-required beds across town sit half-empty while people freeze three blocks away. Tell me which of the names I buried could have waited for a better process.\u201D"},{id:"marcus",name:"Marcus Hale",role:"Peer counselor, formerly homeless",loud:!1,teaser:"He complicates both sides, which is why nobody's quoting him.",insight:"\u201CA shelter saved my life. A badly run one also robbed and beat me \u2014 same year. So spare me the map fight: placement matters less than staffing ratios, and this grant underfunds them. Site it anywhere you like; if there's one worker for ninety beds at 3 a.m., you've built the thing that hurt me.\u201D"},{id:"liaison",name:"Officer Reyes",role:"Police liaison",loud:!1,teaser:"She brought the actual calls-for-service data. Data doesn't testify at meetings.",insight:"\u201CAround the clinic, calls spiked hard in year one, then fell below the neighborhood baseline by year three. I'll say both halves out loud, because Nadia's people lived year one and no chart erases that. The fear isn't irrational. It's just also not the whole graph.\u201D"},{id:"attorney",name:"City Attorney Boll",role:"Legal",loud:!1,teaser:"\u201CBefore you fall in love with the industrial-zone option, read this.\u201D",insight:"\u201CThe industrial site fails two grant requirements \u2014 transit access and proximity to services \u2014 and invites a fair-housing suit. Concentrating services far from where people can actually reach them is its own kind of discrimination. 'Out of sight' is not a legal safe harbor. It's often the opposite.\u201D"}],pressure:{from:"PUBLIC MEETING \u2014 LEAKED",text:"A councilmember has leaked your internal memo \u2014 the one listing Verdon as the 'path of least political resistance.' Nadia's association just read it aloud, word for word, into the microphone. The room turned. The ten-day forecast shows a hard cold snap arriving in three weeks, and every camera in the room now has the phrase 'least resistance' in its notes.",note:"Your own words are being read back to you. Notice how much harder it is to choose Verdon now \u2014 and whether that's conscience or just exposure."},decisionPrompt:"Three weeks to the freeze. The grant expires in sixty days. Where do the ninety beds go?",decisions:[{id:"A",title:"Site it on Verdon \u2014 with a binding compact",body:"Put the shelter on Verdon, but attach a community compact with teeth: staffing minimums, a 24-hour response line, a resident seat on the oversight board, and a mandatory sunset review at eighteen months.",pushes:["The leak turned siting into self-defense","The cold-snap clock"],anchors:["The most exposed can't wait for a better address","Oversight power, not just promises"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CNINETY BEDS BEFORE THE FREEZE \u2014 City chooses the living over the comfortable, and hands residents oversight power no siting deal has ever included.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CCITY DUMPS ON VERDON \u2014 AGAIN \u2014 A working-class street told to absorb what wealthier districts refused. The memo said the quiet part: 'path of least resistance.'\u201D"},later:"TWO YEARS LATER \u2014 Calls spiked, then fell, tracking the clinic's old curve almost exactly. Two Verdon residents now work at the shelter. Nadia never stopped opposing it \u2014 and her presence at every oversight meeting is the single reason the staffing minimums held when the budget got tight. One overdose death inside the shelter made the news. The winter deaths that didn't happen made no news at all. That asymmetry is the whole job."},{id:"B",title:"Decline the building \u2014 go dispersed",body:"Refuse Verdon. Pursue five micro-shelters of 15\u201320 beds across five neighborhoods. Lose this grant; reapply next cycle. The beds arrive a year later \u2014 after this winter.",pushes:["Choosing the defensible plan over the reachable bed"],anchors:["No neighborhood is the city's permanent dumping ground","Shared load beats concentrated load"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CA CITY THAT KEEPS ITS WORD \u2014 Verdon's promise honored, five neighborhoods to share the weight. Advocates call it the first honest siting plan in a decade.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CCOUNCIL CHOOSES PROCESS OVER PEOPLE \u2014 Beds delayed a year, grant money returned to Washington. The warming-van pastor asks which of his people were supposed to wait.\u201D"},later:"TWO YEARS LATER \u2014 The grant was lost. One micro-shelter opened late the following year; two people died in the winter in between, and Rev. Okafor read their names at a council meeting you attended. In year three, the dispersed model was written up as a national template and three other cities adopted it. Both things are true, and they don't cancel \u2014 they just have to be carried at the same time, which is heavier than either one alone."},{id:"C",title:"Site it in the industrial corridor",body:"Open the beds on time, away from the school route \u2014 and away from the bus lines, clinics, and jobs the people inside will need to rebuild. Accept the fair-housing lawsuit risk.",pushes:["'Out of sight' as the path of least conflict","The relief of a quieter map"],anchors:["Beds on time before the freeze"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201COUT OF SIGHT, OUT OF REACH \u2014 Shelter sited two bus transfers from the nearest clinic. Peer counselors call it 'a warehouse with cots.'\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CA WORKABLE COMPROMISE \u2014 Beds open on schedule without breaking faith with a neighborhood. Families along the school route say they were finally heard.\u201D"},later:"TWO YEARS LATER \u2014 The suit settled with a mandated shuttle that runs half-empty. Occupancy stalled at 60% \u2014 the people who most needed the beds couldn't reach the services that make beds into recovery. The downtown encampment persists. Verdon is quiet, and grateful, and its gratitude is real. Nobody is furious. Nobody is helped as much as they could have been. It is the outcome that generates the fewest phone calls and the fewest recoveries at the same time."}],heatPrompt:"After the meeting, Nadia catches you alone. She read the memo. What do you say?",heats:[{id:"blame",title:"Cite the constraints",body:"\u201CThe grant rules, the code requirements, the timeline \u2014 Verdon was the only building that qualified. My hands were tied.\u201D",verdict:"Maybe every word is true. But she asked you a moral question and you handed her a logistics answer, and she heard the swap. 'The rules chose your street' is not a thing a person can be governed by twice.",push:"Hiding a value behind a constraint"},{id:"honest",title:"Answer the question she actually asked",body:"\u201CYou're right about the memo \u2014 that sentence was real, and it should shame me, and it does. Here's the honest difference I can offer, and you can hold me to it: this is the first time the paper doesn't just promise you something, it gives you a seat, a sunset date, and a staffing floor you can enforce when I'm gone. I won't insult you by pretending the pattern isn't the pattern. I'll only ask you to judge whether this is the version that finally breaks it.\u201D",verdict:"She doesn't thank you \u2014 you haven't earned that, and you both know it. But she stops filming, and she stays in the room, and two years later she is still in the room, which turns out to be the difference between a promise and a fact.",anchor:"Name the pattern instead of denying it"},{id:"appease",title:"Promise it won't happen again",body:"\u201CI give you my word \u2014 this is the last time Verdon carries anything. Next facility goes uptown, I'll see to it personally.\u201D",verdict:"You don't control the next siting decision and she's watched enough deputy mayors to know it. The promise doesn't reassure her; it just tells her exactly how much your word is worth, which is a strange thing to volunteer.",push:"The promise you can't underwrite"}]},{id:"surgeon",pack:"hardground",title:"The Surgeon's Hands",role:"You are the Chief Medical Officer.",setting:"Dr. Elias Roth, 68, built this hospital's cardiac program and trained half its surgeons. In eighteen months: two unexpected returns to theater \u2014 above his own historical rate, within the department's range. Then a resident quietly reports seeing his right hand tremor while suturing. Once. At the end of a nine-hour case. Peer review: inconclusive. His overall outcomes stay above the national average \u2014 because he takes the hardest cases, or because the average is hiding the start of a decline. The new wing bears his name.",question:"What do you owe the man in front of you, against the patient you'll never meet?",listenIntro:"You have time for THREE conversations before the story breaks. Everyone has an interest. The trick is that the self-interested people are sometimes also right.",stakeholders:[{id:"roth",name:"Dr. Elias Roth",role:"The surgeon",loud:!0,teaser:"He doesn't beg. He brings his simulator scores.",insight:"The scores are excellent \u2014 though simulators don't run nine hours. \u201CWho operates on the 3 a.m. aortic dissections if I'm out? Answer honestly.\u201D The honest answer is a transfer helicopter to a city two hundred miles away, and he knows you know it. He is not bluffing. He is also not necessarily still the surgeon he was."},{id:"resident",name:"Dr. Pham",role:"The resident who reported",loud:!0,teaser:"Terrified. Second-guessing herself out loud.",insight:"She keeps circling back to whether she imagined it, then stops circling and says the thing that lodges under your ribs: \u201CIf it were my father on the table, and I'd seen what I saw, and said nothing \u2014 I couldn't live in that. So I said it. Even though it might be nothing. Even though it might cost me.\u201D"},{id:"counsel",name:"Counsel Weiss",role:"Hospital legal",loud:!1,teaser:"\u201CLiability cuts both ways here, and I need you to sit with both.\u201D",insight:"\u201CKeep him and something happens on the table: catastrophic, and foreseeable, and documented that you knew. Remove him without formal findings: an age-discrimination suit he probably wins, because a single reported tremor and an above-average record is not a case. There is no clean door. Choose which lawsuit you'd rather defend, because you're choosing one.\u201D"},{id:"nurse",name:"Nurse Adeyemi",role:"Senior OR nurse, 20 years",loud:!1,teaser:"Nurses always know first. Getting her on record is another matter.",insight:"On the record: nothing. Off the record, after a long look at the door: \u201CHe's still better than most surgeons in this building. He is not better than he was three years ago. Both of those are true, and I've watched every hour of it, and I will deny saying it.\u201D"},{id:"younger",name:"Dr. Cole",role:"Younger cardiac surgeon",loud:!1,teaser:"His analysis of Roth's last three years is rigorous. He's also next in line.",insight:"The data he's assembled is genuinely damning around the edges \u2014 and he is the obvious successor as chief of cardiac surgery. \u201CI know how this looks coming from me. Read the numbers anyway, and then discount them for my ambition, and then notice they're still there after you discount them.\u201D The analysis is honest and self-serving. Both facts are load-bearing."}],pressure:{from:"PRESS DESK \u2014 48 HOURS",text:"A journalist calls: someone has tipped them about 'concerns regarding a senior surgeon.' They're publishing in 48 hours either way \u2014 with your comment or with your silence, which reads as its own comment. Dr. Roth is scheduled for a complex reconstruction Thursday. The story will run before the scalpel does, or just after. You no longer get to choose the timeline. Only the substance.",note:"The clock is now external and hostile. Notice the pull to decide fast to control a headline \u2014 and what that pull has to do with a patient's chest."},decisionPrompt:"Thursday's case is scheduled. The story runs in 48 hours. What do you do about Dr. Roth?",decisions:[{id:"A",title:"The quiet transition",body:"He moves to teaching, simulation, and proctoring others \u2014 announced as his own choice, effective month's end. No fitness review. No findings. No record.",pushes:["Trading the future patient for the present peace","The gravity of a name on the building"],anchors:["Dignity for a life of service"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CGRACE, FOR ONCE \u2014 Hospital proves accountability and dignity aren't enemies; a legend steps aside on his own terms.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CTHE HOSPITAL THAT HANDLED IT QUIETLY \u2014 No review, no findings, no record. And a surgeon who remains licensed to operate anywhere in the country tomorrow.\u201D"},later:"TWO YEARS LATER \u2014 He teaches, beautifully; residents fight to scrub with him in the sim lab. Then a hospital two states over granted him full surgical privileges \u2014 nothing in his record said not to, because you made sure there was no record. You find yourself pulling their published mortality reports at night. Nothing yet. 'Yet' has become a word you use a lot. You bought one man his dignity with a risk you exported to strangers who never got a vote."},{id:"B",title:"Formal fitness-for-duty review",body:"Suspend surgical privileges pending neurological and psychomotor evaluation. Public within days. If he passes, you have publicly wounded a great man for nothing. If he fails, the record protects the next patient \u2014 anywhere he might ever practice.",pushes:[],anchors:["The same checklist for the star","A record protects the patient you'll never meet","Transparency is a hospital's only currency"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CNO ONE IS ABOVE THE CHECKLIST \u2014 Hospital applies to its founder the standard it applies to every resident. 'Transparency is the only currency we have.'\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CHOSPITAL TURNS ON ITS FOUNDER \u2014 Forty years of service answered with a public competency trial over one reported tremor. Age-bias complaint filed within the week.\u201D"},later:"TWO YEARS LATER \u2014 He passed the evaluation, narrowly, retired within the year anyway, and never spoke to you again \u2014 that cost is permanent and it was yours to pay. The resident, Dr. Pham, became the person others quietly bring their fears to; something in the culture unclenched. You changed what this hospital is, at the price of a man who might have been completely fine. You will never know which he was. The checklist protected someone. You can't point to them, and that's the nature of the thing you protected."},{id:"C",title:"Proctored practice",body:"He keeps operating \u2014 with a senior colleague scrubbed in on every case, quietly, for six months of real data before anyone decides anything.",pushes:["The comfort of deferring the actual decision"],anchors:["Evidence over rumor","A measured response to an unproven concern"],lens1:{where:"THE MORNING LEDGER (left-leaning):",text:"\u201CEVIDENCE OVER RUMOR \u2014 Six months of supervised data will answer what gossip can't. A measured response to an unproven concern.\u201D"},lens2:{where:"THE FISCAL TRIBUNE (right-leaning):",text:"\u201CSURGERY WITH TRAINING WHEELS \u2014 If he needs a minder, why is he holding the knife? A leaked proctoring memo asks the question nobody will answer.\u201D"},later:"TWO YEARS LATER \u2014 In month four, the proctor took over mid-case. Quietly. No drama, no headline \u2014 just a senior colleague's hand replacing an unsteady one over an open chest. Roth retired the following week; the data stayed sealed by agreement, so it protects no future patient anywhere. The 3 a.m. dissections now fly out by helicopter. One patient died en route last winter. You still can't say whether Roth would have saved her, or been the reason she needed saving. The middle path answered the question about Roth and left the harder one exactly where it was."}],heatPrompt:"Roth sits in your office. Not angry \u2014 which is worse. He wants one
